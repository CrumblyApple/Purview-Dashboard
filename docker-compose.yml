services:
  backend:
    build: ./backend
    container_name: purview-backend
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build: ./frontend
    container_name: purview-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
